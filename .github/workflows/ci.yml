name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run validate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile ansible_collections/optdyn/he_net/plugins/modules/he_net_record.py ansible_collections/optdyn/he_net/plugins/modules/he_net_zone.py
